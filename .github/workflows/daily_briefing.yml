name: Daily AI Research Briefing

on:
  schedule:
    # Run at 7am UTC every day
    - cron: '0 7 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the generated briefing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing agent
        env:
          HUGGINGFACEHUB_API_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        # Continue even if there are partial failures (resilience)
        run: python main.py || echo "Agent completed with errors (check logs above)"

      - name: Commit briefing to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(date +%Y-%m-%d)

          git add output/

          if git diff --staged --quiet; then
            echo "No new briefing to commit"
          else
            git commit -m "briefing: $DATE"
            git push
          fi

      - name: Upload briefing as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_id }}
          path: output/
          retention-days: 30
